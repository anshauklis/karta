# Production Docker Compose -- uses pre-built images from GHCR
# Usage: docker compose -f docker-compose.ghcr.yml up -d
#
# For SSL, layer the SSL overlay on top:
#   docker compose -f docker-compose.ghcr.yml -f docker-compose.prod.yml up -d
#
# Requires .env file with at minimum:
#   POSTGRES_PASSWORD, JWT_SECRET, CONNECTION_SECRET, REDIS_PASSWORD

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: karta
      POSTGRES_USER: karta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karta"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ghcr.io/anshauklis/karta/api:main
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DATABASE_URL: postgresql://karta:${POSTGRES_PASSWORD}@postgres:5432/karta
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      CONNECTION_SECRET: ${CONNECTION_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      DISABLE_DOCS: ${DISABLE_DOCS:-true}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_API_URL: ${AI_API_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    volumes:
      - ./data/csv:/app/data/csv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    image: ghcr.io/anshauklis/karta/frontend:main
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      NEXTAUTH_SECRET: ${JWT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
