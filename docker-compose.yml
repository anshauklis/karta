services:
  postgres:
    container_name: karta-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: karta
      POSTGRES_USER: karta
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 1g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karta"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/csv:/app/data/csv
    environment:
      DATABASE_URL: postgresql://karta:${POSTGRES_PASSWORD}@postgres:5432/karta
      JWT_SECRET: ${JWT_SECRET}
      CONNECTION_SECRET: ${CONNECTION_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      DISABLE_DOCS: ${DISABLE_DOCS:-true}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      AI_API_URL: ${AI_API_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o}
      AI_ENABLED: ${AI_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 4g
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      NEXTAUTH_SECRET: ${JWT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost}
      # NEXT_PUBLIC_API_URL is baked at build time (empty = relative URLs via nginx)
    depends_on:
      api:
        condition: service_healthy
    mem_limit: 768m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "${PORT:-8090}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-changeme}"]
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp:
    build: ./mcp
    profiles: ["mcp"]
    security_opt:
      - no-new-privileges:true
    ports:
      - "127.0.0.1:${MCP_PORT:-8811}:8811"
    environment:
      KARTA_API_URL: http://api:8000
      KARTA_EMAIL: ${MCP_USER_EMAIL:-}
      KARTA_PASSWORD: ${MCP_USER_PASSWORD:-}
      MCP_PORT: "8811"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
